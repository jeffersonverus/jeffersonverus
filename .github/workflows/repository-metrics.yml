name: Metrics Repository
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Cache básico
        uses: lowlighter/metrics@latest
        with:
          # Modelo focado em repositórios
          template: repository
          
          # Nome do novo arquivo de imagem que será gerado
          filename: metrics.repository.svg
          
          # Mantemos o token clássico que você já configurou com sucesso
          token: ${{ secrets.METRICS_TOKEN }}
          
          # SEU USUÁRIO DO GITHUB
          user: jeffersonverus
          
          # O NOME DO REPOSITÓRIO QUE VOCÊ QUER MOSTRAR OS DADOS
          # (Exemplo: se quiser mostrar os dados do próprio repositório do seu perfil)
          repo: jeffersonverus
          
          # Plugins extras ativados no exemplo da imagem
          plugin_lines: yes
          plugin_followup: yes
