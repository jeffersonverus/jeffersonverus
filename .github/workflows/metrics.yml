name: Metrics
on:
  # Agenda a atualização automática a cada 12 horas
  schedule: [{cron: "0 */12 * * *"}]
  # Permite que você execute manualmente quando quiser testar
  workflow_dispatch:
  # Executa sempre que você atualizar o README principal
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Cache básico
        uses: lowlighter/metrics@latest
        with:
          # Nome do arquivo de imagem que será gerado no seu repositório
          filename: metrics.classic.svg
          
          # O token secreto que configuramos no passo anterior
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Opções de exibição (baseadas no seu print)
          base: header, repositories
          plugin_lines: yes
