```yaml
name: Metrics Terminal
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Cache básico
        uses: lowlighter/metrics@latest
        with:
          # Define o visual estilo terminal Linux
          template: terminal
          
          # Nome do arquivo de imagem que será gerado na raiz
          filename: metrics.terminal.svg
          
          # Usando o mesmo token clássico que já funciona
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Dados que vão aparecer simulando o comando 'whoami'
          base: header, metadata
